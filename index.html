<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Conveniência · Sistema de Estoque</title>
  
  <!-- Bibliotecas -->
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  
  <!-- Estilos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- ========== HEADER ========== -->
    <header class="header">
      <div class="header-left">
        <!-- Botão Hamburguer (mobile) -->
        <button class="menu-toggle" id="menuToggle" onclick="app.toggleSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        
        <div class="logo">
          <i class="fas fa-store"></i>
          <span>Minha Conveniência</span>
        </div>
      </div>
      
      <div class="stats-mini">
        <span><i class="fas fa-box"></i> <span id="totalProdutos">0</span></span>
        <span><i class="fas fa-shopping-cart"></i> <span id="vendasHoje">0</span></span>
      </div>
      
      <div class="header-actions">
        <button class="btn btn-primary" onclick="scanner.abrir()">
          <i class="fas fa-barcode"></i> <span class="btn-text">Scanner</span>
        </button>
      </div>
    </header>
    
    <!-- ========== SIDEBAR + CONTEÚDO ========== -->
    <div class="app-layout">
      <!-- Sidebar (Menu Lateral) -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <i class="fas fa-store-alt"></i>
          <span>Menu Principal</span>
          <button class="sidebar-close" id="sidebarClose" onclick="app.closeSidebar()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        
        <nav class="sidebar-nav">
          <button class="sidebar-btn active" data-page="estoque" onclick="app.mudarPagina('estoque')">
            <i class="fas fa-boxes"></i>
            <span>Estoque</span>
          </button>
          <button class="sidebar-btn" data-page="vendas" onclick="app.mudarPagina('vendas')">
            <i class="fas fa-shopping-cart"></i>
            <span>Vender</span>
          </button>
          <button class="sidebar-btn" data-page="historico" onclick="app.mudarPagina('historico')">
            <i class="fas fa-history"></i>
            <span>Histórico</span>
          </button>
          <button class="sidebar-btn" data-page="cadastro" onclick="app.mudarPagina('cadastro')">
            <i class="fas fa-plus-circle"></i>
            <span>Cadastrar</span>
          </button>
          <button class="sidebar-btn" data-page="relatorios" onclick="app.mudarPagina('relatorios')">
            <i class="fas fa-chart-bar"></i>
            <span>Relatórios</span>
          </button>
          <button class="sidebar-btn" data-page="fornecedores" onclick="app.mudarPagina('fornecedores')">
            <i class="fas fa-truck"></i>
            <span>Fornecedores</span>
          </button>
          <button class="sidebar-btn" data-page="configuracoes" onclick="app.mudarPagina('configuracoes')">
            <i class="fas fa-cog"></i>
            <span>Configurações</span>
          </button>
        </nav>
        
        <div class="sidebar-footer">
          <p><i class="fas fa-code-branch"></i> v2.0.0</p>
          <p><i class="fas fa-cloud"></i> Supabase</p>
        </div>
      </aside>
      
      <!-- Overlay (fundo escuro quando sidebar aberta no mobile) -->
      <div class="sidebar-overlay" id="sidebarOverlay" onclick="app.closeSidebar()"></div>
      
      <!-- Conteúdo Principal -->
      <main class="main-content">
        <div id="content" class="content"></div>
      </main>
    </div>
    

  </div>
  
  <!-- ========== SCANNER MODAL ========== -->
  <div class="scanner-modal" id="scannerModal">
    <div class="scanner-container">
      <div class="scanner-header">
        <h3>
          <i class="fas fa-barcode"></i> 
          Scanner Inteligente
          <span style="font-size: 0.8rem; opacity: 0.8; margin-left: 8px;">
            📷 Câmera | 🔌 USB
          </span>
        </h3>
        <div style="display: flex; gap: 8px;">
          <button class="scanner-btn" onclick="scanner.toggleUSB()" title="Ativar/Desativar Leitor USB">
            <i class="fas fa-usb"></i>
          </button>
          <button class="scanner-btn" onclick="scanner.fechar()">
            <i class="fas fa-times"></i> Fechar
          </button>
        </div>
      </div>
      
      <div class="scanner-video-container">
        <video id="scanner-video"></video>
        <div class="scanner-guide"></div>
        <div style="position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;">
          <i class="fas fa-camera"></i> Câmera
        </div>
        <div style="position: absolute; bottom: 20px; right: 20px; color: #10b981; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;">
          <i class="fas fa-volume-up"></i> Bip Ativo
        </div>
      </div>
      
      <div class="scanner-result">
        <span id="lastScanText">
          🔍 Aguardando código...<br>
          <small>Use a câmera ou leitor USB</small>
        </span>
      </div>
      
      <div class="scanner-footer">
        <input type="text" id="manualBarcode" placeholder="Ou digite o código manualmente">
        <button class="scanner-btn primary" onclick="scanner.usarManual()">
          <i class="fas fa-check"></i> Usar
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>


  <script>
  // Garantir que a sidebar funcione no mobile
  (function() {
    // Forçar correção da sidebar no mobile
    const style = document.createElement('style');
    style.textContent = `
      @media (max-width: 768px) {
        .sidebar {
          position: fixed !important;
          top: 0 !important;
          left: -100% !important;
          width: 280px !important;
          max-width: 85vw !important;
          height: 100vh !important;
          z-index: 1000 !important;
          transition: left 0.3s ease !important;
          box-shadow: 0 0 20px rgba(0,0,0,0.3) !important;
        }
        
        .sidebar.open {
          left: 0 !important;
        }
        
        .sidebar-overlay {
          display: none !important;
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          width: 100% !important;
          height: 100% !important;
          background: rgba(0,0,0,0.5) !important;
          z-index: 999 !important;
        }
        
        .sidebar.open ~ .sidebar-overlay,
        .sidebar-overlay.active {
          display: block !important;
        }
        
        .menu-toggle {
          display: block !important;
        }
        
        .sidebar-close {
          display: block !important;
        }
        
        body.sidebar-open {
          overflow: hidden !important;
        }
      }
    `;
    document.head.appendChild(style);
    
    // Corrigir toggle da sidebar
    const originalToggle = app.toggleSidebar;
    app.toggleSidebar = function() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      
      if (sidebar) {
        sidebar.classList.toggle('open');
        
        if (sidebar.classList.contains('open')) {
          document.body.classList.add('sidebar-open');
          if (overlay) overlay.classList.add('active');
        } else {
          document.body.classList.remove('sidebar-open');
          if (overlay) overlay.classList.remove('active');
        }
      }
    };
    
    app.closeSidebar = function() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      
      if (sidebar) {
        sidebar.classList.remove('open');
        document.body.classList.remove('sidebar-open');
        if (overlay) overlay.classList.remove('active');
      }
    };
    
    // Fechar ao clicar no overlay
    document.addEventListener('DOMContentLoaded', function() {
      const overlay = document.getElementById('sidebarOverlay');
      if (overlay) {
        overlay.addEventListener('click', function() {
          app.closeSidebar();
        });
      }
      
      // Fechar ao clicar em um link da sidebar (mobile)
      document.querySelectorAll('.sidebar-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          if (window.innerWidth <= 768) {
            setTimeout(() => app.closeSidebar(), 100);
          }
        });
      });
    });
    
    // Corrigir redimensionamento
    window.addEventListener('resize', function() {
      if (window.innerWidth > 768) {
        app.closeSidebar();
      }
    });
  })();
</script>

  <!-- ========== SCRIPTS ========== -->
  <script src="js/supabase.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/estoque.js"></script>
  <script src="js/vendas.js"></script>
  <script src="js/historico.js"></script>
  <script src="js/fornecedores.js"></script>
  <script src="js/relatorios.js"></script>
  <script src="js/configuracoes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
