<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SaaS Conveniência Pro · Gestão Completa</title>
  <!-- Bibliotecas de Scanner -->
  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <!-- Chart.js para gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #main-content {
      flex: 1;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* Animações */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Cards e containers */
    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      animation: slideIn 0.3s ease-out;
      margin-bottom: 24px;
    }

    /* Botões */
    .btn {
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1px solid #e2e8f0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      border: none;
    }

    .btn-danger {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      color: white;
      border: none;
    }

    .btn-warning {
      background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%);
      color: white;
      border: none;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
    }

    .btn-outline:hover {
      background: #f8fafc;
    }

    /* Inputs e selects */
    input, select, textarea {
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid #e1e8ed;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
      background: white;
    }

    input:focus, select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    /* Tabs de navegação */
    .nav-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.1);
      padding: 8px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .nav-tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-tab:hover {
      background: rgba(255,255,255,0.1);
    }

    .nav-tab.active {
      background: white;
      color: #667eea;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    /* Estatísticas */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
    }

    .stat-label {
      color: #64748b;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #1e293b;
      margin: 10px 0;
    }

    .stat-trend {
      color: #10b981;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Tabelas */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      text-align: left;
      padding: 16px 12px;
      background: #f8fafc;
      font-weight: 600;
      color: #334155;
      border-bottom: 2px solid #e2e8f0;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    /* Badges e alertas */
    .badge {
      background: #e0e7ff;
      color: #4338ca;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .alert-badge {
      background: #fee2e2;
      color: #dc2626;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      animation: pulse 2s infinite;
    }

    /* Scanner Modal */
    .scanner-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      display: none;
      animation: fadeIn 0.3s;
    }

    .scanner-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .scanner-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .scanner-viewport {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scanner-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scanner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .scanner-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 180px;
      border: 3px solid #00ff00;
      border-radius: 20px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
      animation: pulseGuide 2s infinite;
    }

    @keyframes pulseGuide {
      0%, 100% { border-color: #00ff00; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 20px #00ff00; }
      50% { border-color: #00aa00; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 40px #00ff00; }
    }

    .scanner-controls {
      background: rgba(0,0,0,0.9);
      padding: 20px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .scanner-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .scanner-result {
      background: rgba(255,255,255,0.1);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      text-align: center;
      font-size: 1.2rem;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .scanner-history {
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .history-item {
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.2s;
    }

    .history-item:hover {
      background: rgba(102, 126, 234, 0.3);
    }

    .camera-switch, .torch-btn {
      position: absolute;
      bottom: 100px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 10;
    }

    .camera-switch { right: 20px; }
    .torch-btn { left: 20px; }

    .scan-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: #00ff00;
      padding: 8px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }

    .scan-indicator.scanning {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .camera-selector {
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      margin: 0 10px;
    }

    /* Gráficos */
    .chart-container {
      position: relative;
      height: 300px;
      margin: 20px 0;
    }

    /* Toast */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
    }

    .modal {
      background: white;
      border-radius: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 30px;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      #main-content { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr; }
      .nav-tabs { justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header-container"></div>

    <!-- Conteúdo Principal -->
    <main id="main-content"></main>

    <!-- Footer -->
    <div id="footer-container"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scanner Modal -->
  <div id="advanced-scanner" class="scanner-modal">
    <div class="scanner-container">
      <div class="scanner-header">
        <div style="display: flex; align-items: center; gap: 16px;">
          <i class="fas fa-barcode" style="font-size: 24px;"></i>
          <h2 style="margin: 0;">Scanner Avançado</h2>
        </div>
        <div style="display: flex; gap: 10px;">
          <select id="camera-select" class="camera-selector">
            <option value="">Carregando câmeras...</option>
          </select>
          <button class="scanner-btn" onclick="scannerManager.close()" style="background: rgba(255,255,255,0.2); color: white;">
            <i class="fas fa-times"></i> Fechar
          </button>
        </div>
      </div>

      <div class="scanner-viewport">
        <video id="scanner-video" autoplay playsinline></video>
        <div class="scanner-overlay">
          <div class="scanner-guide"></div>
          <div class="scan-indicator scanning" id="scan-indicator">
            <i class="fas fa-search"></i>
            <span>Escaneando...</span>
          </div>
          <button class="camera-switch" onclick="scannerManager.switchCamera()" title="Alternar câmera">
            <i class="fas fa-sync-alt"></i>
          </button>
          <button class="torch-btn" onclick="scannerManager.toggleTorch()" title="Lanterna">
            <i class="fas fa-lightbulb" id="torch-icon"></i>
          </button>
        </div>
      </div>

      <div class="scanner-controls">
        <button class="scanner-btn" onclick="scannerManager.useManualEntry()" style="background: #667eea; color: white;">
          <i class="fas fa-keyboard"></i> Digitar Código
        </button>
        <button class="scanner-btn" onclick="scannerManager.clearHistory()" style="background: rgba(255,255,255,0.1); color: white;">
          <i class="fas fa-trash"></i> Limpar Histórico
        </button>
        <button class="scanner-btn" onclick="scannerManager.exportHistory()" style="background: rgba(255,255,255,0.1); color: white;">
          <i class="fas fa-download"></i> Exportar
        </button>
      </div>

      <div style="padding: 20px; background: rgba(0,0,0,0.9);">
        <div class="scanner-result" id="last-scan-result">
          <i class="fas fa-qrcode"></i> Último scan: <span id="last-scan-text">Nenhum</span>
        </div>
        
        <div class="scanner-history" id="scanner-history">
          <h4 style="margin-bottom: 10px; color: white;">
            <i class="fas fa-history"></i> Histórico de Scans
          </h4>
          <div id="history-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Entrada Manual -->
  <div id="manual-entry-modal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h3><i class="fas fa-keyboard"></i> Digitar Código de Barras</h3>
      <input type="text" id="manual-barcode-input" placeholder="Digite o código" style="width: 100%; margin: 20px 0; font-size: 1.2rem; text-align: center;">
      <div style="display: flex; gap: 10px; justify-content: flex-end;">
        <button class="btn" onclick="scannerManager.closeManualEntry()">Cancelar</button>
        <button class="btn btn-primary" onclick="scannerManager.confirmManualEntry()">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    // ========== DADOS GLOBAIS ==========
    let produtos = [];
    let categorias = ['Bebidas', 'Doces', 'Salgados', 'Laticínios', 'Higiene', 'Limpeza', 'Outros'];
    let vendas = [];
    let fornecedores = [];
    let clientes = [];
    let configuracoes = {
      alertaEstoqueBaixo: 10,
      moeda: 'BRL',
      tema: 'light',
      nomeLoja: 'Minha Conveniência'
    };
    let paginaAtual = 'dashboard';
    let carrinhoVenda = [];

    // ========== INICIALIZAÇÃO ==========
    function inicializarDados() {
      const stored = {
        produtos: localStorage.getItem('conv_produtos'),
        categorias: localStorage.getItem('conv_categorias'),
        vendas: localStorage.getItem('conv_vendas'),
        fornecedores: localStorage.getItem('conv_fornecedores'),
        clientes: localStorage.getItem('conv_clientes'),
        configuracoes: localStorage.getItem('conv_config')
      };

      if (stored.produtos) {
        produtos = JSON.parse(stored.produtos);
      } else {
        produtos = [
          { id: '1', nome: 'Água Mineral 500ml', codigoBarras: '7891234567890', preco: 2.50, quantidade: 45, categoria: 'Bebidas', fornecedor: 'Distribuidora Águas', estoqueMinimo: 20 },
          { id: '2', nome: 'Refrigerante Lata 350ml', codigoBarras: '7892345678901', preco: 4.99, quantidade: 8, categoria: 'Bebidas', fornecedor: 'Coca-Cola', estoqueMinimo: 15 },
          { id: '3', nome: 'Chocolate Barra 100g', codigoBarras: '7893456789012', preco: 7.90, quantidade: 18, categoria: 'Doces', fornecedor: 'Nestlé', estoqueMinimo: 10 },
          { id: '4', nome: 'Salgadinho 80g', codigoBarras: '7894567890123', preco: 6.50, quantidade: 5, categoria: 'Salgados', fornecedor: 'Elma Chips', estoqueMinimo: 12 },
          { id: '5', nome: 'Café em Cápsulas 10un', codigoBarras: '7895678901234', preco: 19.90, quantidade: 3, categoria: 'Bebidas', fornecedor: 'Nespresso', estoqueMinimo: 8 }
        ];
      }

      if (stored.categorias) {
        categorias = JSON.parse(stored.categorias);
      }

      if (stored.vendas) {
        vendas = JSON.parse(stored.vendas);
      } else {
        vendas = [
          { id: 'v1', data: new Date(Date.now() - 86400000).toISOString(), itens: [{ id: '1', nome: 'Água Mineral 500ml', quantidade: 2, preco: 2.50 }], total: 5.00, cliente: 'Cliente Balcão' },
          { id: 'v2', data: new Date().toISOString(), itens: [{ id: '2', nome: 'Refrigerante Lata', quantidade: 1, preco: 4.99 }], total: 4.99, cliente: 'João Silva' }
        ];
      }

      if (stored.fornecedores) {
        fornecedores = JSON.parse(stored.fornecedores);
      } else {
        fornecedores = [
          { id: 'f1', nome: 'Distribuidora Águas', contato: '(11) 9999-9999', email: 'contato@aguas.com' },
          { id: 'f2', nome: 'Coca-Cola', contato: '0800 123 456', email: 'vendas@coca.com' }
        ];
      }

      if (stored.clientes) {
        clientes = JSON.parse(stored.clientes);
      } else {
        clientes = [
          { id: 'c1', nome: 'João Silva', telefone: '(11) 98888-7777', email: 'joao@email.com', totalCompras: 156.80 },
          { id: 'c2', nome: 'Maria Santos', telefone: '(11) 97777-6666', email: 'maria@email.com', totalCompras: 89.90 }
        ];
      }

      if (stored.configuracoes) {
        configuracoes = JSON.parse(stored.configuracoes);
      }
    }

    function salvarDados() {
      localStorage.setItem('conv_produtos', JSON.stringify(produtos));
      localStorage.setItem('conv_categorias', JSON.stringify(categorias));
      localStorage.setItem('conv_vendas', JSON.stringify(vendas));
      localStorage.setItem('conv_fornecedores', JSON.stringify(fornecedores));
      localStorage.setItem('conv_clientes', JSON.stringify(clientes));
      localStorage.setItem('conv_config', JSON.stringify(configuracoes));
    }

    // ========== SISTEMA DE TOAST ==========
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const colors = {
        success: 'linear-gradient(135deg, #11998e, #38ef7d)',
        error: 'linear-gradient(135deg, #eb3349, #f45c43)',
        warning: 'linear-gradient(135deg, #f2994a, #f2c94c)',
        info: 'linear-gradient(135deg, #667eea, #764ba2)'
      };
      
      toast.style.cssText = `
        background: ${colors[type] || colors.info};
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        margin-bottom: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: slideIn 0.3s;
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 300px;
      `;
      
      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle',
        info: 'fa-info-circle'
      };
      
      toast.innerHTML = `<i class="fas ${icons[type]}"></i> ${message}`;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s reverse';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // ========== SCANNER MANAGER ==========
    class ScannerManager {
      constructor() {
        this.modal = document.getElementById('advanced-scanner');
        this.video = document.getElementById('scanner-video');
        this.lastScanSpan = document.getElementById('last-scan-text');
        this.historyList = document.getElementById('history-list');
        this.scanIndicator = document.getElementById('scan-indicator');
        this.cameraSelect = document.getElementById('camera-select');
        this.manualModal = document.getElementById('manual-entry-modal');
        
        this.currentStream = null;
        this.currentCamera = 'environment';
        this.torchEnabled = false;
        this.scanHistory = [];
        this.callback = null;
        this.scanning = true;
        this.codeReader = null;
        this.availableCameras = [];
        
        this.loadHistory();
        this.initializeZXing();
        this.setupCameraSelection();
      }

      async initializeZXing() {
        try {
          this.codeReader = new ZXing.BrowserMultiFormatReader();
          console.log('ZXing inicializado');
        } catch (error) {
          console.error('Erro ao inicializar ZXing:', error);
        }
      }

      async setupCameraSelection() {
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          this.availableCameras = devices.filter(device => device.kind === 'videoinput');
          
          this.cameraSelect.innerHTML = this.availableCameras.map((camera, index) => 
            `<option value="${camera.deviceId}">${camera.label || `Câmera ${index + 1}`}</option>`
          ).join('');
          
          if (this.availableCameras.length > 0) {
            this.cameraSelect.value = this.availableCameras.find(c => 
              c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('traseira')
            )?.deviceId || this.availableCameras[0].deviceId;
          }
          
          this.cameraSelect.addEventListener('change', () => this.switchToCamera(this.cameraSelect.value));
        } catch (error) {
          console.error('Erro ao listar câmeras:', error);
        }
      }

      async open(callback) {
        this.callback = callback;
        this.modal.style.display = 'block';
        await this.startScanning();
      }

      async startScanning() {
        try {
          const deviceId = this.cameraSelect.value;
          const constraints = {
            video: {
              deviceId: deviceId ? { exact: deviceId } : undefined,
              facingMode: this.currentCamera,
              width: { ideal: 1280 },
              height: { ideal: 720 }
            }
          };
          
          this.currentStream = await navigator.mediaDevices.getUserMedia(constraints);
          this.video.srcObject = this.currentStream;
          
          this.decodeContinuously();
          
          this.scanIndicator.classList.add('scanning');
          this.scanIndicator.innerHTML = '<i class="fas fa-search"></i><span>Escaneando...</span>';
        } catch (error) {
          console.error('Erro ao acessar câmera:', error);
          showToast('Não foi possível acessar a câmera', 'error');
        }
      }

      async decodeContinuously() {
        if (!this.codeReader || !this.scanning) return;
        
        try {
          const result = await this.codeReader.decodeOnceFromVideoDevice(undefined, this.video);
          if (result && result.text) {
            this.handleScanResult(result.text);
          }
        } catch (error) {
          // Ignora erros de decodificação
        }
        
        if (this.scanning) {
          setTimeout(() => this.decodeContinuously(), 100);
        }
      }

      handleScanResult(code) {
        if (!this.scanning) return;
        
        this.scanIndicator.classList.remove('scanning');
        this.scanIndicator.innerHTML = '<i class="fas fa-check-circle"></i><span>Código detectado!</span>';
        this.scanIndicator.style.color = '#00ff00';
        
        if (navigator.vibrate) navigator.vibrate(100);
        
        this.addToHistory(code);
        this.lastScanSpan.textContent = code;
        
        if (this.callback) {
          this.callback(code);
        }
        
        this.showProductInfo(code);
        
        setTimeout(() => {
          this.scanIndicator.classList.add('scanning');
          this.scanIndicator.innerHTML = '<i class="fas fa-search"></i><span>Escaneando...</span>';
          this.scanIndicator.style.color = '#00ff00';
        }, 2000);
        
        showToast(`Código detectado: ${code}`, 'success');
      }

      showProductInfo(code) {
        const produto = produtos.find(p => p.codigoBarras === code);
        if (produto) {
          showToast(`${produto.nome} - R$ ${produto.preco.toFixed(2)} (${produto.quantidade} em estoque)`, 'info');
        }
      }

      addToHistory(code) {
        const scanEntry = {
          code,
          timestamp: new Date().toISOString(),
          productFound: produtos.some(p => p.codigoBarras === code)
        };
        
        this.scanHistory.unshift(scanEntry);
        if (this.scanHistory.length > 50) this.scanHistory.pop();
        
        this.saveHistory();
        this.updateHistoryDisplay();
      }

      updateHistoryDisplay() {
        this.historyList.innerHTML = this.scanHistory.map(entry => `
          <div class="history-item" onclick="scannerManager.useHistoryCode('${entry.code}')">
            <span>
              <i class="fas ${entry.productFound ? 'fa-check-circle' : 'fa-question-circle'}" 
                 style="color: ${entry.productFound ? '#48bb78' : '#a0aec0'};"></i>
              ${entry.code}
            </span>
            <span style="color: #a0aec0; font-size: 0.9rem;">
              ${new Date(entry.timestamp).toLocaleTimeString()}
            </span>
          </div>
        `).join('');
      }

      useHistoryCode(code) {
        this.handleScanResult(code);
      }

      async switchCamera() {
        this.currentCamera = this.currentCamera === 'environment' ? 'user' : 'environment';
        this.stopStream();
        await this.startScanning();
      }

      async switchToCamera(deviceId) {
        this.stopStream();
        await this.startScanning();
      }

      async toggleTorch() {
        try {
          const track = this.currentStream?.getVideoTracks()[0];
          if (track && track.getCapabilities().torch) {
            this.torchEnabled = !this.torchEnabled;
            await track.applyConstraints({
              advanced: [{ torch: this.torchEnabled }]
            });
            
            const torchIcon = document.getElementById('torch-icon');
            torchIcon.style.color = this.torchEnabled ? '#ffdd00' : 'white';
            showToast(this.torchEnabled ? 'Lanterna ligada' : 'Lanterna desligada', 'info');
          } else {
            showToast('Lanterna não disponível nesta câmera', 'warning');
          }
        } catch (error) {
          console.error('Erro ao controlar lanterna:', error);
        }
      }

      stopStream() {
        if (this.currentStream) {
          this.currentStream.getTracks().forEach(track => track.stop());
          this.currentStream = null;
        }
      }

      useManualEntry() {
        this.scanning = false;
        this.manualModal.style.display = 'flex';
      }

      confirmManualEntry() {
        const input = document.getElementById('manual-barcode-input');
        const code = input.value.trim();
        
        if (code) {
          this.handleScanResult(code);
          this.closeManualEntry();
        }
      }

      closeManualEntry() {
        this.manualModal.style.display = 'none';
        document.getElementById('manual-barcode-input').value = '';
        this.scanning = true;
      }

      clearHistory() {
        if (confirm('Limpar histórico de scans?')) {
          this.scanHistory = [];
          this.saveHistory();
          this.updateHistoryDisplay();
          showToast('Histórico limpo', 'info');
        }
      }

      exportHistory() {
        const data = JSON.stringify(this.scanHistory, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `scanner-history-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        showToast('Histórico exportado', 'success');
      }

      saveHistory() {
        localStorage.setItem('scanner_history', JSON.stringify(this.scanHistory));
      }

      loadHistory() {
        const stored = localStorage.getItem('scanner_history');
        if (stored) {
          this.scanHistory = JSON.parse(stored);
        }
      }

      close() {
        this.scanning = false;
        this.stopStream();
        this.modal.style.display = 'none';
        this.callback = null;
      }
    }

        const data = new Date();
        data.setDate(data.getDate() - i);
        const dataStr = data.toISOString().split('T')[0];
        const vendasDia = vendas.filter(v => v.data.startsWith(dataStr));
        const totalDia = vendasDia.reduce((acc, v) => acc + v.total, 0);
        
        ultimos7Dias.push(data.toLocaleDateString('pt-BR', { weekday: 'short' }));
        vendasPorDia.push(totalDia);
      }
      
      const ctx1 = document.getElementById('vendasChart')?.getContext('2d');
      if (ctx1) {
        new Chart(ctx1, {
          type: 'line',
          data: {
            labels: ultimos7Dias,
            datasets: [{
              label: 'Vendas (R$)',
              data: vendasPorDia,
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.1)',
              tension: 0.4,
              fill: true
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false
          }
        });
      }
      
      // Dados para gráfico de categorias
      const categoriasData = {};
      produtos.forEach(p => {
        categoriasData[p.categoria] = (categoriasData[p.categoria] || 0) + p.quantidade;
      });
      
      const ctx2 = document.getElementById('categoriasChart')?.getContext('2d');
      if (ctx2) {
        new Chart(ctx2, {
          type: 'doughnut',
          data: {
            labels: Object.keys(categoriasData),
            datasets: [{
              data: Object.values(categoriasData),
              backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#f6d365']
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false
          }
        });
      }
    }

    function attachCadastroEvents() {
      const form = document.getElementById('form-cadastro');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const nome = document.getElementById('cad-nome').value.trim();
        const codigo = document.getElementById('cad-codigo').value.trim() || `SEM_CODIGO_${Date.now()}`;
        const preco = parseFloat(document.getElementById('cad-preco').value);
        const quantidade = parseInt(document.getElementById('cad-quantidade').value);
        const categoria = document.getElementById('cad-categoria').value;
        const estoqueMinimo = parseInt(document.getElementById('cad-estoque-minimo').value);
        const fornecedor = document.getElementById('cad-fornecedor').value.trim();
        
        if (!nome || !categoria || isNaN(preco) || isNaN(quantidade)) {
          showToast('Preencha todos os campos obrigatórios', 'error');
          return;
        }
        
        const novoProduto = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
          nome,
          codigoBarras: codigo,
          preco,
          quantidade,
          categoria,
          estoqueMinimo,
          fornecedor: fornecedor || 'Não informado'
        };
        
        produtos.push(novoProduto);
        salvarDados();
        showToast('Produto cadastrado com sucesso!', 'success');
        form.reset();
        renderPage('estoque');
      });
    }

    // ========== VENDAS ==========
    function renderVendas() {
      return `
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
          <div class="card">
            <h3><i class="fas fa-search"></i> Buscar Produto</h3>
            <div style="display: flex; gap: 10px; margin: 16px 0;">
              <input type="text" id="busca-produto-venda" placeholder="Nome ou código de barras" style="flex: 1;">
              <button class="btn btn-outline" onclick="scannerManager.open((code) => { document.getElementById('busca-produto-venda').value = code; buscarProduto(code); })">
                <i class="fas fa-barcode"></i>
              </button>
            </div>
            <div id="resultado-busca-venda" style="max-height: 400px; overflow-y: auto;"></div>
          </div>
          
          <div class="card">
            <h3><i class="fas fa-shopping-basket"></i> Carrinho</h3>
            <div id="carrinho-container" style="max-height: 400px; overflow-y: auto;"></div>
            <hr style="margin: 16px 0;">
            
            <div style="margin-bottom: 16px;">
              <label>Cliente (opcional):</label>
              <select id="cliente-venda" style="width: 100%; margin-top: 8px;">
                <option value="">Cliente Balcão</option>
                ${clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('')}
              </select>
            </div>
            
            <div style="font-size: 1.4rem; font-weight: 700; margin-bottom: 16px;">
              Total: R$ <span id="venda-total">0.00</span>
            </div>
            
            <button class="btn btn-success" style="width: 100%;" id="finalizar-venda">
              <i class="fas fa-check-circle"></i> Finalizar Venda
            </button>
          </div>
        </div>
      `;
    }

    function attachVendasEvents() {
      const buscaInput = document.getElementById('busca-produto-venda');
      const resultadoDiv = document.getElementById('resultado-busca-venda');
      
      window.buscarProduto = function(termo) {
        if (!termo) {
          resultadoDiv.innerHTML = '<p style="color: #94a3b8; text-align: center;">Digite um nome ou código para buscar</p>';
          return;
        }
        
        const resultados = produtos.filter(p => 
          p.nome.toLowerCase().includes(termo.toLowerCase()) || 
          p.codigoBarras.includes(termo)
        );
        
        if (resultados.length === 0) {
          resultadoDiv.innerHTML = '<p style="color: #94a3b8; text-align: center;">Nenhum produto encontrado</p>';
          return;
        }
        
        resultadoDiv.innerHTML = resultados.map(p => `
          <div style="padding: 12px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
            <div>
              <div style="font-weight: 600;">${p.nome}</div>
              <div style="color: #64748b; font-size: 0.9rem;">R$ ${p.preco.toFixed(2)} | Estoque: ${p.quantidade}</div>
            </div>
            <button class="btn btn-primary" onclick="adicionarAoCarrinho('${p.id}')" style="padding: 6px 12px;" ${p.quantidade === 0 ? 'disabled' : ''}>
              <i class="fas fa-plus"></i> Adicionar
            </button>
          </div>
        `).join('');
      };
      
      window.adicionarAoCarrinho = function(produtoId) {
        const produto = produtos.find(p => p.id === produtoId);
        if (!produto || produto.quantidade === 0) {
          showToast('Produto sem estoque', 'error');
          return;
        }
        
        const itemExistente = carrinhoVenda.find(i => i.id === produtoId);
        if (itemExistente) {
          if (itemExistente.quantidade < produto.quantidade) {
            itemExistente.quantidade++;
          } else {
            showToast('Quantidade máxima atingida', 'warning');
            return;
          }
        } else {
          carrinhoVenda.push({
            id: produto.id,
            nome: produto.nome,
            preco: produto.preco,
            quantidade: 1
          });
        }
        
        atualizarCarrinhoUI();
        showToast(`${produto.nome} adicionado ao carrinho`, 'success');
      };
      
      window.atualizarCarrinhoUI = function() {
        const container = document.getElementById('carrinho-container');
        const totalSpan = document.getElementById('venda-total');
        
        if (carrinhoVenda.length === 0) {
          container.innerHTML = '<p style="color: #94a3b8; text-align: center;">Carrinho vazio</p>';
          totalSpan.textContent = '0.00';
          return;
        }
        
        let total = 0;
        container.innerHTML = carrinhoVenda.map((item, index) => {
          const subtotal = item.preco * item.quantidade;
          total += subtotal;
          
          return `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #e2e8f0;">
              <div style="flex: 1;">
                <div style="font-weight: 500;">${item.nome}</div>
                <div style="color: #64748b; font-size: 0.85rem;">
                  ${item.quantidade}x R$ ${item.preco.toFixed(2)}
                </div>
              </div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-weight: 600;">R$ ${subtotal.toFixed(2)}</span>
                <button class="btn-outline" onclick="removerDoCarrinho(${index})" style="padding: 2px 6px;">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          `;
        }).join('');
        
        totalSpan.textContent = total.toFixed(2);
      };
      
      window.removerDoCarrinho = function(index) {
        carrinhoVenda.splice(index, 1);
        atualizarCarrinhoUI();
      };
      
      document.getElementById('finalizar-venda').addEventListener('click', () => {
        if (carrinhoVenda.length === 0) {
          showToast('Carrinho vazio', 'warning');
          return;
        }
        
        // Verificar estoque
        for (let item of carrinhoVenda) {
          const produto = produtos.find(p => p.id === item.id);
          if (!produto || produto.quantidade < item.quantidade) {
            showToast(`Estoque insuficiente para ${item.nome}`, 'error');
            return;
          }
        }
        
        // Atualizar estoque
        carrinhoVenda.forEach(item => {
          const produto = produtos.find(p => p.id === item.id);
          produto.quantidade -= item.quantidade;
        });
        
        // Registrar venda
        const clienteId = document.getElementById('cliente-venda').value;
        const cliente = clienteId ? clientes.find(c => c.id === clienteId) : null;
        const total = carrinhoVenda.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
        
        const venda = {
          id: 'v' + Date.now(),
          data: new Date().toISOString(),
          itens: [...carrinhoVenda],
          total,
          cliente: cliente ? cliente.nome : 'Cliente Balcão'
        };
        
        vendas.push(venda);
        
        // Atualizar total de compras do cliente
        if (cliente) {
          cliente.totalCompras = (cliente.totalCompras || 0) + total;
        }
        
        salvarDados();
        carrinhoVenda = [];
        atualizarCarrinhoUI();
        
        showToast(`Venda finalizada! Total: R$ ${total.toFixed(2)}`, 'success');
        renderPage('vendas');
      });
      
      buscaInput.addEventListener('input', (e) => buscarProduto(e.target.value));
      atualizarCarrinhoUI();
    }

    // ========== CLIENTES ==========
    function renderClientes() {
      return `
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2><i class="fas fa-users"></i> Gestão de Clientes</h2>
            <button class="btn btn-success" onclick="abrirModalCliente()">
              <i class="fas fa-plus"></i> Novo Cliente
            </button>
          </div>
          
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Telefone</th>
                  <th>Email</th>
                  <th>Total em Compras</th>
                  <th>Última Compra</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                ${clientes.map(c => {
                  const ultimaCompra = vendas.filter(v => v.cliente === c.nome).sort((a, b) => 
                    new Date(b.data) - new Date(a.data)
                  )[0];
                  
                  return `
                    <tr>
                      <td>${c.nome}</td>
                      <td>${c.telefone}</td>
                      <td>${c.email}</td>
                      <td>R$ ${(c.totalCompras || 0).toFixed(2)}</td>
                      <td>${ultimaCompra ? new Date(ultimaCompra.data).toLocaleDateString() : 'Nunca'}</td>
                      <td>
                        <button class="btn-outline" onclick="editarCliente('${c.id}')" style="padding:4px 8px;">
                          <i class="fas fa-edit"></i>
                        </button>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function attachClientesEvents() {
      // Implementar eventos de clientes se necessário
    }

    // ========== RELATÓRIOS ==========
    function renderRelatorios() {
      const vendasPorCategoria = {};
      vendas.forEach(v => {
        v.itens.forEach(item => {
          const produto = produtos.find(p => p.id === item.id);
          if (produto) {
            vendasPorCategoria[produto.categoria] = (vendasPorCategoria[produto.categoria] || 0) + (item.preco * item.quantidade);
          }
        });
      });
      
      const produtosMaisVendidos = {};
      vendas.forEach(v => {
        v.itens.forEach(item => {
          produtosMaisVendidos[item.nome] = (produtosMaisVendidos[item.nome] || 0) + item.quantidade;
        });
      });
      
      const topProdutos = Object.entries(produtosMaisVendidos)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);
      
      return `
        <div>
          <div class="card">
            <h3><i class="fas fa-chart-bar"></i> Vendas por Categoria</h3>
            <div class="chart-container">
              <canvas id="vendasCategoriaChart"></canvas>
            </div>
          </div>
          
          <div class="card">
            <h3><i class="fas fa-trophy"></i> Produtos Mais Vendidos</h3>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr><th>#</th><th>Produto</th><th>Quantidade Vendida</th></tr>
                </thead>
                <tbody>
                  ${topProdutos.map(([nome, qtd], index) => `
                    <tr>
                      <td>${index + 1}º</td>
                      <td>${nome}</td>
                      <td>${qtd} unidades</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
          
          <div class="card">
            <h3><i class="fas fa-calendar"></i> Resumo Financeiro</h3>
            <div style="display: grid; gap: 16px;">
              <div>
                <strong>Faturamento Total:</strong> R$ ${vendas.reduce((acc, v) => acc + v.total, 0).toFixed(2)}
              </div>
              <div>
                <strong>Total de Vendas:</strong> ${vendas.length}
              </div>
              <div>
                <strong>Ticket Médio:</strong> R$ ${vendas.length ? (vendas.reduce((acc, v) => acc + v.total, 0) / vendas.length).toFixed(2) : '0.00'}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ========== FUNÇÕES GLOBAIS ==========
    window.reporEstoque = function(produtoId) {
      const produto = produtos.find(p => p.id === produtoId);
      if (!produto) return;
      
      const quantidade = prompt(`Quantidade para repor ${produto.nome}?`, '10');
      if (quantidade && !isNaN(quantidade)) {
        produto.quantidade += parseInt(quantidade);
        salvarDados();
        showToast(`+${quantidade} unidades de ${produto.nome}`, 'success');
        renderPage(paginaAtual);
      }
    };

    window.editarProduto = function(produtoId) {
      const produto = produtos.find(p => p.id === produtoId);
      if (!produto) return;
      
      const novoNome = prompt('Nome do produto:', produto.nome);
      if (novoNome) produto.nome = novoNome;
      
      const novoPreco = prompt('Preço:', produto.preco);
      if (novoPreco && !isNaN(novoPreco)) produto.preco = parseFloat(novoPreco);
      
      const novaQuantidade = prompt('Quantidade:', produto.quantidade);
      if (novaQuantidade && !isNaN(novaQuantidade)) produto.quantidade = parseInt(novaQuantidade);
      
      salvarDados();
      showToast('Produto atualizado', 'success');
      renderPage('estoque');
    };

    window.excluirProduto = function(produtoId) {
      if (confirm('Tem certeza que deseja excluir este produto?')) {
        produtos = produtos.filter(p => p.id !== produtoId);
        salvarDados();
        showToast('Produto excluído', 'success');
        renderPage('estoque');
      }
    };

    window.abrirModalProduto = function() {
      renderPage('cadastro');
    };

    window.abrirModalCliente = function() {
      const nome = prompt('Nome do cliente:');
      if (!nome) return;
      
      const telefone = prompt('Telefone:');
      const email = prompt('Email:');
      
      const novoCliente = {
        id: 'c' + Date.now(),
        nome,
        telefone: telefone || '',
        email: email || '',
        totalCompras: 0
      };
      
      clientes.push(novoCliente);
      salvarDados();
      showToast('Cliente cadastrado', 'success');
      renderPage('clientes');
    };

    // ========== INICIALIZAÇÃO ==========
    inicializarDados();
    
    document.getElementById('header-container').innerHTML = renderHeader();
    document.getElementById('footer-container').innerHTML = renderFooter();
    
    renderPage('dashboard');
  </script>
</body>
