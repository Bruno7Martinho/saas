<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Conveniência · Sistema de Estoque</title>
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #f3f4f6;
      min-height: 100vh;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-mini {
      display: flex;
      gap: 20px;
      color: #6b7280;
      font-size: 0.9rem;
    }

    /* Navegação */
    .nav {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0 24px;
      border-bottom: 1px solid #e5e7eb;
      background: white;
    }

    .nav-btn {
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-weight: 500;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .nav-btn:hover {
      background: #f9fafb;
      color: #374151;
    }

    .nav-btn.active {
      background: #f3f4f6;
      color: #2563eb;
      border-bottom: 2px solid #2563eb;
    }

    /* Conteúdo */
    .content {
      padding: 24px;
      flex: 1;
    }

    /* Cards */
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    /* Botões */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      color: #374151;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-success {
      background: #059669;
      color: white;
      border-color: #059669;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
      border-color: #dc2626;
    }

    .btn-sm {
      padding: 4px 8px;
      font-size: 0.85rem;
    }

    /* Inputs */
    input, select, textarea {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.15s;
      background: white;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
    }

    /* Tabelas */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      text-align: left;
      padding: 12px;
      background: #f9fafb;
      font-weight: 600;
      color: #374151;
      border-bottom: 1px solid #e5e7eb;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #f3f4f6;
    }

    tr:hover {
      background: #f9fafb;
    }

    /* Badges */
    .badge {
      background: #e5e7eb;
      color: #374151;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .badge-success {
      background: #d1fae5;
      color: #065f46;
    }

    .badge-danger {
      background: #fee2e2;
      color: #dc2626;
    }

    /* Scanner Modal */
    .scanner-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      display: none;
    }

    .scanner-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .scanner-header {
      padding: 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1f2937;
    }

    .scanner-video-container {
      flex: 1;
      position: relative;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scanner-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scanner-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 180px;
      border: 3px solid #10b981;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
    }

    .scanner-footer {
      padding: 20px;
      background: #1f2937;
      display: flex;
      gap: 12px;
    }

    .scanner-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      background: #374151;
      color: white;
    }

    .scanner-btn.primary {
      background: #2563eb;
    }

    .scanner-result {
      background: #111827;
      color: white;
      padding: 12px 20px;
      text-align: center;
      font-size: 1.1rem;
      border-top: 1px solid #374151;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal {
      background: white;
      border-radius: 8px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 10001;
      animation: slideUp 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .toast-error {
      background: #dc2626;
    }

    .toast-success {
      background: #059669;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translate(-50%, 20px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    /* Grid e utilitários */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .mb-4 {
      margin-bottom: 16px;
    }

    .mt-4 {
      margin-top: 16px;
    }

    .flex {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .w-full {
      width: 100%;
    }

    /* Responsivo */
    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
      
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .nav {
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <i class="fas fa-store"></i>
        Minha Conveniência
      </div>
      <div class="stats-mini">
        <span><i class="fas fa-box"></i> <span id="totalProdutos">0</span> produtos</span>
        <span><i class="fas fa-shopping-cart"></i> <span id="vendasHoje">0</span> vendas hoje</span>
      </div>
      <div class="flex">
        <button class="btn btn-primary" onclick="abrirScanner()">
          <i class="fas fa-barcode"></i> Scanner
        </button>
      </div>
    </header>
    
    <!-- Navegação -->
    <div class="nav">
      <button class="nav-btn active" data-page="estoque" onclick="mudarPagina('estoque')">
        <i class="fas fa-boxes"></i> Estoque
      </button>
      <button class="nav-btn" data-page="cadastro" onclick="mudarPagina('cadastro')">
        <i class="fas fa-plus-circle"></i> Cadastrar
      </button>
      <button class="nav-btn" data-page="vendas" onclick="mudarPagina('vendas')">
        <i class="fas fa-shopping-cart"></i> Vendas
      </button>
    </div>
    
    <!-- Conteúdo -->
    <div class="content" id="content"></div>
  </div>
  
  <!-- Scanner Modal -->
  <div class="scanner-modal" id="scannerModal">
    <div class="scanner-container">
      <div class="scanner-header">
        <h3><i class="fas fa-barcode"></i> Leitor de Código de Barras</h3>
        <button class="scanner-btn" onclick="fecharScanner()">
          <i class="fas fa-times"></i> Fechar
        </button>
      </div>
      
      <div class="scanner-video-container">
        <video id="scanner-video"></video>
        <div class="scanner-guide"></div>
      </div>
      
      <div class="scanner-result" id="scannerResult">
        <span id="lastScanText">🔍 Posicione o código de barras na área verde</span>
      </div>
      
      <div class="scanner-footer">
        <input type="text" id="manualBarcode" placeholder="Ou digite o código manualmente" style="flex:1; background:#374151; color:white; border-color:#4b5563;">
        <button class="scanner-btn primary" onclick="usarCodigoManual()">
          <i class="fas fa-check"></i> Usar
        </button>
      </div>
    </div>
  </div>

  <script>
    // ========== DADOS GLOBAIS ==========
    let produtos = [];
    let vendas = [];
    let paginaAtual = 'estoque';
    let carrinho = [];
    let scannerAtivo = false;
    let codeReader = null;
    let callbackScanner = null;
    
    // ========== INICIALIZAÇÃO ==========
    function inicializar() {
      const dados = localStorage.getItem('conveniencia_data');
      if (dados) {
        const data = JSON.parse(dados);
        produtos = data.produtos || [];
        vendas = data.vendas || [];
      } else {
        // Dados de exemplo
        produtos = [
          { id: '1', nome: 'Água Mineral 500ml', codigo: '7891234567890', preco: 2.50, quantidade: 45, estoqueMinimo: 10 },
          { id: '2', nome: 'Refrigerante Lata 350ml', codigo: '7892345678901', preco: 4.99, quantidade: 20, estoqueMinimo: 15 },
          { id: '3', nome: 'Chocolate 100g', codigo: '7893456789012', preco: 7.90, quantidade: 15, estoqueMinimo: 10 },
          { id: '4', nome: 'Salgadinho 80g', codigo: '7894567890123', preco: 6.50, quantidade: 8, estoqueMinimo: 12 },
          { id: '5', nome: 'Café Expresso', codigo: '7895678901234', preco: 3.50, quantidade: 30, estoqueMinimo: 20 }
        ];
        vendas = [];
      }
      salvarDados();
      atualizarStats();
      mudarPagina('estoque');
    }
    
    function salvarDados() {
      localStorage.setItem('conveniencia_data', JSON.stringify({ produtos, vendas }));
    }
    
    function atualizarStats() {
      document.getElementById('totalProdutos').textContent = produtos.length;
      const hoje = new Date().toDateString();
      const vendasHoje = vendas.filter(v => new Date(v.data).toDateString() === hoje).length;
      document.getElementById('vendasHoje').textContent = vendasHoje;
    }
    
    // ========== TOAST ==========
    function mostrarToast(mensagem, tipo = 'info') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      if (tipo === 'success') toast.classList.add('toast-success');
      if (tipo === 'error') toast.classList.add('toast-error');
      toast.innerHTML = `<i class="fas fa-${tipo === 'success' ? 'check-circle' : tipo === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${mensagem}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // ========== SCANNER ==========
    async function abrirScanner(callback) {
      callbackScanner = callback || handleCodigoEscaneado;
      const modal = document.getElementById('scannerModal');
      modal.style.display = 'block';
      
      try {
        codeReader = new ZXing.BrowserMultiFormatReader();
        const devices = await codeReader.listVideoInputDevices();
        
        // Preferir câmera traseira
        const device = devices.find(d => 
          d.label.toLowerCase().includes('back') || 
          d.label.toLowerCase().includes('traseira') ||
          d.label.toLowerCase().includes('environment')
        ) || devices[0];
        
        if (!device) {
          mostrarToast('Nenhuma câmera encontrada', 'error');
          fecharScanner();
          return;
        }
        
        scannerAtivo = true;
        
        await codeReader.decodeFromVideoDevice(
          device.deviceId,
          'scanner-video',
          (resultado, erro) => {
            if (resultado && scannerAtivo) {
              const codigo = resultado.text;
              document.getElementById('lastScanText').textContent = `✅ Código detectado: ${codigo}`;
              
              // Feedback tátil
              if (navigator.vibrate) navigator.vibrate(50);
              
              // Executar callback
              if (callbackScanner) {
                callbackScanner(codigo);
              }
              
              // Fechar scanner
              setTimeout(() => fecharScanner(), 800);
            }
            
            if (erro && !(erro instanceof ZXing.NotFoundException)) {
              console.warn('Erro no scan:', erro);
            }
          }
        );
        
        document.getElementById('lastScanText').textContent = '🔍 Escaneando...';
      } catch (error) {
        console.error('Erro no scanner:', error);
        mostrarToast('Erro ao acessar câmera', 'error');
        fecharScanner();
      }
    }
    
    function fecharScanner() {
      scannerAtivo = false;
      if (codeReader) {
        codeReader.reset();
        codeReader = null;
      }
      document.getElementById('scannerModal').style.display = 'none';
      const video = document.getElementById('scanner-video');
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
    }
    
    function usarCodigoManual() {
      const input = document.getElementById('manualBarcode');
      const codigo = input.value.trim();
      if (codigo) {
        if (callbackScanner) callbackScanner(codigo);
        fecharScanner();
        input.value = '';
      }
    }
    
    // ========== HANDLER DO SCANNER ==========
    function handleCodigoEscaneado(codigo) {
      console.log('Código escaneado:', codigo);
      
      if (paginaAtual === 'vendas') {
        // Adicionar ao carrinho
        const produto = produtos.find(p => p.codigo === codigo);
        if (produto) {
          if (produto.quantidade > 0) {
            adicionarAoCarrinho(produto.id);
            mostrarToast(`${produto.nome} adicionado`, 'success');
          } else {
            mostrarToast('Produto sem estoque!', 'error');
          }
        } else {
          mostrarToast(`Produto não encontrado: ${codigo}`, 'error');
        }
      } else if (paginaAtual === 'cadastro') {
        // Preencher campo de código
        const input = document.getElementById('codigoInput');
        if (input) {
          input.value = codigo;
          mostrarToast(`Código preenchido: ${codigo}`, 'success');
        }
      } else {
        // Mostrar info do produto
        const produto = produtos.find(p => p.codigo === codigo);
        if (produto) {
          mostrarToast(`${produto.nome} - R$ ${produto.preco.toFixed(2)} | Estoque: ${produto.quantidade}`, 'info');
        } else {
          mostrarToast(`Código não cadastrado: ${codigo}`, 'error');
        }
      }
    }
    
    // ========== NAVEGAÇÃO ==========
    function mudarPagina(pagina) {
      paginaAtual = pagina;
      
      // Atualizar botões
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.page === pagina) btn.classList.add('active');
      });
      
      // Renderizar página
      if (pagina === 'estoque') renderizarEstoque();
      else if (pagina === 'cadastro') renderizarCadastro();
      else if (pagina === 'vendas') renderizarVendas();
    }
    
    // ========== RENDERIZAR ESTOQUE ==========
    function renderizarEstoque() {
      const produtosBaixo = produtos.filter(p => p.quantidade <= p.estoqueMinimo);
      
      document.getElementById('content').innerHTML = `
        <div class="card">
          <div class="flex-between mb-4">
            <h2><i class="fas fa-boxes"></i> Controle de Estoque</h2>
            <div class="flex">
              <input type="text" id="buscaEstoque" placeholder="Buscar produto..." style="width: 250px;">
              <button class="btn btn-primary" onclick="abrirModalLote()">
                <i class="fas fa-upload"></i> Importar Lote
              </button>
            </div>
          </div>
          
          ${produtosBaixo.length > 0 ? `
            <div style="background: #fef3c7; border: 1px solid #fbbf24; border-radius: 6px; padding: 12px; margin-bottom: 16px;">
              <i class="fas fa-exclamation-triangle" style="color: #d97706;"></i>
              <strong>${produtosBaixo.length} produtos com estoque baixo</strong>
            </div>
          ` : ''}
          
          <div class="table-wrapper">
            <table id="tabelaEstoque">
              <thead>
                <tr>
                  <th>Produto</th>
                  <th>Código</th>
                  <th>Preço</th>
                  <th>Estoque</th>
                  <th>Mínimo</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                ${produtos.map(p => `
                  <tr>
                    <td>${p.nome}</td>
                    <td><code>${p.codigo}</code></td>
                    <td>R$ ${p.preco.toFixed(2)}</td>
                    <td>${p.quantidade}</td>
                    <td>${p.estoqueMinimo || 10}</td>
                    <td>
                      ${p.quantidade <= (p.estoqueMinimo || 10) ? 
                        '<span class="badge badge-danger">Baixo</span>' : 
                        '<span class="badge badge-success">Normal</span>'}
                    </td>
                    <td>
                      <div class="flex">
                        <button class="btn btn-sm" onclick="ajustarEstoque('${p.id}')" title="Ajustar">
                          <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm" onclick="excluirProduto('${p.id}')" title="Excluir">
                          <i class="fas fa-trash"></i>
                        </button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
      
      // Busca
      document.getElementById('buscaEstoque').addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        const tbody = document.querySelector('#tabelaEstoque tbody');
        const filtrados = produtos.filter(p => 
          p.nome.toLowerCase().includes(termo) || 
          p.codigo.includes(termo)
        );
        
        tbody.innerHTML = filtrados.map(p => `
          <tr>
            <td>${p.nome}</td>
            <td><code>${p.codigo}</code></td>
            <td>R$ ${p.preco.toFixed(2)}</td>
            <td>${p.quantidade}</td>
            <td>${p.estoqueMinimo || 10}</td>
            <td>
              ${p.quantidade <= (p.estoqueMinimo || 10) ? 
                '<span class="badge badge-danger">Baixo</span>' : 
                '<span class="badge badge-success">Normal</span>'}
            </td>
            <td>
              <div class="flex">
                <button class="btn btn-sm" onclick="ajustarEstoque('${p.id}')">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-sm" onclick="excluirProduto('${p.id}')">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
      });
    }
    
    // ========== RENDERIZAR CADASTRO ==========
    function renderizarCadastro() {
      document.getElementById('content').innerHTML = `
        <div class="grid-2">
          <div class="card">
            <h2 class="mb-4"><i class="fas fa-plus-circle"></i> Cadastrar Produto</h2>
            <form onsubmit="cadastrarProduto(event)">
              <div class="mb-4">
                <label>Nome do Produto *</label>
                <input type="text" id="nomeInput" class="w-full" required>
              </div>
              
              <div class="mb-4">
                <label>Código de Barras *</label>
                <div class="flex">
                  <input type="text" id="codigoInput" class="w-full" required>
                  <button type="button" class="btn" onclick="abrirScanner((codigo) => document.getElementById('codigoInput').value = codigo)">
                    <i class="fas fa-barcode"></i>
                  </button>
                </div>
              </div>
              
              <div class="grid-2 mb-4">
                <div>
                  <label>Preço (R$) *</label>
                  <input type="number" id="precoInput" step="0.01" class="w-full" required>
                </div>
                <div>
                  <label>Quantidade *</label>
                  <input type="number" id="qtdInput" class="w-full" required>
                </div>
              </div>
              
              <div class="mb-4">
                <label>Estoque Mínimo</label>
                <input type="number" id="minInput" value="10" class="w-full">
              </div>
              
              <button type="submit" class="btn btn-primary w-full">
                <i class="fas fa-save"></i> Cadastrar Produto
              </button>
            </form>
          </div>
          
          <div class="card">
            <h3 class="mb-4"><i class="fas fa-info-circle"></i> Dicas</h3>
            <ul style="list-style: none; padding: 0;">
              <li class="mb-4">✓ Use o scanner para preencher o código automaticamente</li>
              <li class="mb-4">✓ Para múltiplos produtos, use "Importar Lote"</li>
              <li class="mb-4">✓ Formato do lote: Nome;Código;Preço;Quantidade</li>
              <li class="mb-4">✓ Exemplo: Água;7891234567890;2.50;50</li>
            </ul>
            <button class="btn btn-success w-full" onclick="abrirModalLote()">
              <i class="fas fa-upload"></i> Importar Múltiplos Produtos
            </button>
          </div>
        </div>
      `;
    }
    
    function cadastrarProduto(e) {
      e.preventDefault();
      
      const nome = document.getElementById('nomeInput').value.trim();
      const codigo = document.getElementById('codigoInput').value.trim();
      const preco = parseFloat(document.getElementById('precoInput').value);
      const quantidade = parseInt(document.getElementById('qtdInput').value);
      const minimo = parseInt(document.getElementById('minInput').value);
      
      if (produtos.find(p => p.codigo === codigo)) {
        mostrarToast('Código já cadastrado!', 'error');
        return;
      }
      
      produtos.push({
        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
        nome,
        codigo,
        preco,
        quantidade,
        estoqueMinimo: minimo
      });
      
      salvarDados();
      atualizarStats();
      mostrarToast('Produto cadastrado com sucesso!', 'success');
      mudarPagina('estoque');
    }
    
    // ========== MODAL LOTE ==========
    function abrirModalLote() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <h3><i class="fas fa-upload"></i> Importar Produtos em Lote</h3>
          <p style="color: #6b7280; margin: 12px 0;">
            Cole os produtos no formato:<br>
            <code>Nome; Código; Preço; Quantidade; Estoque Mínimo (opcional)</code>
          </p>
          <textarea id="loteInput" rows="10" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-family: monospace;" placeholder="Água 500ml;7891234567890;2.50;50;10&#10;Refrigerante;7892345678901;4.99;30;15&#10;Chocolate;7893456789012;7.90;20;10"></textarea>
          
          <div class="flex mt-4" style="justify-content: flex-end;">
            <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
            <button class="btn btn-primary" onclick="processarLote()">Importar</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }
    
    function processarLote() {
      const texto = document.getElementById('loteInput').value;
      const linhas = texto.split('\n').filter(l => l.trim());
      let adicionados = 0;
      let ignorados = 0;
      
      linhas.forEach(linha => {
        const partes = linha.split(';').map(p => p.trim());
        if (partes.length >= 4) {
          const [nome, codigo, preco, quantidade, minimo] = partes;
          
          if (!produtos.find(p => p.codigo === codigo)) {
            produtos.push({
              id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
              nome,
              codigo,
              preco: parseFloat(preco),
              quantidade: parseInt(quantidade),
              estoqueMinimo: minimo ? parseInt(minimo) : 10
            });
            adicionados++;
          } else {
            ignorados++;
          }
        }
      });
      
      salvarDados();
      atualizarStats();
      
      document.querySelector('.modal-overlay').remove();
      mostrarToast(`${adicionados} produtos importados! ${ignorados} ignorados (códigos duplicados)`, 'success');
      
      if (paginaAtual === 'estoque') renderizarEstoque();
    }
    
    // ========== RENDERIZAR VENDAS ==========
    function renderizarVendas() {
      const total = carrinho.reduce((acc, i) => acc + (i.preco * i.quantidade), 0);
      
      document.getElementById('content').innerHTML = `
        <div class="grid-2">
          <div class="card">
            <h3 class="mb-4"><i class="fas fa-search"></i> Buscar Produtos</h3>
            <div class="flex mb-4">
              <input type="text" id="buscaVenda" placeholder="Nome ou código" class="w-full">
              <button class="btn btn-primary" onclick="abrirScanner()">
                <i class="fas fa-barcode"></i>
              </button>
            </div>
            <div id="listaProdutos" style="max-height: 500px; overflow-y: auto;">
              ${produtos.map(p => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e5e7eb;">
                  <div>
                    <div style="font-weight: 500;">${p.nome}</div>
                    <div style="color: #6b7280; font-size: 0.9rem;">
                      R$ ${p.preco.toFixed(2)} | Estoque: ${p.quantidade}
                    </div>
                  </div>
                  <button class="btn btn-primary btn-sm" onclick="adicionarAoCarrinho('${p.id}')" ${p.quantidade === 0 ? 'disabled' : ''}>
                    <i class="fas fa-plus"></i>
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
          
          <div class="card">
            <h3 class="mb-4"><i class="fas fa-shopping-cart"></i> Carrinho</h3>
            <div id="carrinhoContainer" style="max-height: 400px; overflow-y: auto;">
              ${carrinho.length === 0 ? 
                '<p style="color: #9ca3af; text-align: center; padding: 20px;">Carrinho vazio</p>' : 
                carrinho.map((item, i) => `
                  <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e5e7eb;">
                    <div style="flex: 1;">
                      <div>${item.nome}</div>
                      <div style="color: #6b7280; font-size: 0.9rem;">
                        ${item.quantidade}x R$ ${item.preco.toFixed(2)}
                      </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <span style="font-weight: 600;">R$ ${(item.preco * item.quantidade).toFixed(2)}</span>
                      <button class="btn btn-sm" onclick="removerDoCarrinho(${i})">
                        <i class="fas fa-trash"></i>
                      </button>
                    </div>
                  </div>
                `).join('')
              }
            </div>
            
            <hr style="margin: 16px 0; border: none; border-top: 2px solid #e5e7eb;">
            
            <div style="font-size: 1.5rem; font-weight: 700; margin-bottom: 16px;">
              Total: R$ ${total.toFixed(2)}
            </div>
            
            <button class="btn btn-success w-full" onclick="finalizarVenda()" ${carrinho.length === 0 ? 'disabled' : ''}>
              <i class="fas fa-check-circle"></i> Finalizar Venda
            </button>
            
            ${carrinho.length > 0 ? `
              <button class="btn w-full mt-4" onclick="limparCarrinho()">
                <i class="fas fa-trash"></i> Limpar Carrinho
              </button>
            ` : ''}
          </div>
        </div>
      `;
      
      // Busca
      document.getElementById('buscaVenda').addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        const container = document.getElementById('listaProdutos');
        const filtrados = produtos.filter(p => 
          p.nome.toLowerCase().includes(termo) || p.codigo.includes(termo)
        );
        
        container.innerHTML = filtrados.map(p => `
          <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e5e7eb;">
            <div>
              <div style="font-weight: 500;">${p.nome}</div>
              <div style="color: #6b7280; font-size: 0.9rem;">
                R$ ${p.preco.toFixed(2)} | Estoque: ${p.quantidade}
              </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="adicionarAoCarrinho('${p.id}')" ${p.quantidade === 0 ? 'disabled' : ''}>
              <i class="fas fa-plus"></i>
            </button>
          </div>
        `).join('');
      });
    }
    
    // ========== FUNÇÕES DO CARRINHO ==========
    function adicionarAoCarrinho(produtoId) {
      const produto = produtos.find(p => p.id === produtoId);
      if (!produto || produto.quantidade === 0) {
        mostrarToast('Produto sem estoque!', 'error');
        return;
      }
      
      const item = carrinho.find(i => i.id === produtoId);
      if (item) {
        if (item.quantidade < produto.quantidade) {
          item.quantidade++;
        } else {
          mostrarToast('Quantidade máxima atingida!', 'error');
          return;
        }
      } else {
        carrinho.push({ ...produto, quantidade: 1 });
      }
      
      mostrarToast(`${produto.nome} adicionado`, 'success');
      renderizarVendas();
    }
    
    function removerDoCarrinho(index) {
      carrinho.splice(index, 1);
      renderizarVendas();
    }
    
    function limparCarrinho() {
      if (confirm('Limpar carrinho?')) {
        carrinho = [];
        renderizarVendas();
      }
    }
    
    function finalizarVenda() {
      // Verificar estoque
      for (let item of carrinho) {
        const produto = produtos.find(p => p.id === item.id);
        if (!produto || produto.quantidade < item.quantidade) {
          mostrarToast(`Estoque insuficiente para ${item.nome}`, 'error');
          return;
        }
      }
      
      // Atualizar estoque
      carrinho.forEach(item => {
        const produto = produtos.find(p => p.id === item.id);
        produto.quantidade -= item.quantidade;
      });
      
      // Registrar venda
      const total = carrinho.reduce((acc, i) => acc + (i.preco * i.quantidade), 0);
      vendas.push({
        id: 'v' + Date.now(),
        data: new Date().toISOString(),
        itens: [...carrinho],
        total
      });
      
      salvarDados();
      atualizarStats();
      
      mostrarToast(`Venda finalizada! Total: R$ ${total.toFixed(2)}`, 'success');
      carrinho = [];
      mudarPagina('vendas');
    }
    
    // ========== FUNÇÕES DE ESTOQUE ==========
    function ajustarEstoque(produtoId) {
      const produto = produtos.find(p => p.id === produtoId);
      if (!produto) return;
      
      const novaQtd = prompt(`Quantidade atual: ${produto.quantidade}\nNova quantidade:`, produto.quantidade);
      if (novaQtd !== null && !isNaN(novaQtd)) {
        produto.quantidade = parseInt(novaQtd);
        salvarDados();
        atualizarStats();
        mostrarToast('Estoque atualizado!', 'success');
        renderizarEstoque();
      }
    }
    
    function excluirProduto(produtoId) {
      if (confirm('Excluir este produto?')) {
        produtos = produtos.filter(p => p.id !== produtoId);
        salvarDados();
        atualizarStats();
        mostrarToast('Produto excluído!', 'success');
        renderizarEstoque();
      }
    }
    
    // ========== INICIAR ==========
    inicializar();
  </script>
</body>
</html>
