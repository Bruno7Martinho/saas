<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conveniência · Sistema de Estoque</title>
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <i class="fas fa-store"></i>
        <span>Minha Conveniência</span>
        <span>a01</span>
      </div>
      <div class="stats-mini">
        <span><i class="fas fa-box"></i> <span id="totalProdutos">0</span></span>
        <span><i class="fas fa-shopping-cart"></i> <span id="vendasHoje">0</span></span>
      </div>
      <button class="btn btn-primary" onclick="scanner.abrir()">
        <i class="fas fa-barcode"></i> Scanner
      </button>
    </header>
    
    <!-- Navegação -->
    <nav class="nav">
      <button class="nav-btn active" data-page="estoque" onclick="app.mudarPagina('estoque')">
        <i class="fas fa-boxes"></i> Estoque
      </button>
      <button class="nav-btn" data-page="cadastro" onclick="app.mudarPagina('cadastro')">
        <i class="fas fa-plus-circle"></i> Cadastrar
      </button>
      <button class="nav-btn" data-page="vendas" onclick="app.mudarPagina('vendas')">
        <i class="fas fa-shopping-cart"></i> Vendas
      </button>
    </nav>
    
    <!-- Conteúdo Dinâmico -->
    <main class="content" id="content"></main>
  </div>
  
  <!-- Scanner Modal Atualizado -->
<div class="scanner-modal" id="scannerModal">
  <div class="scanner-container">
    <div class="scanner-header">
      <h3>
        <i class="fas fa-barcode"></i> 
        Scanner Inteligente
        <span style="font-size: 0.8rem; opacity: 0.8; margin-left: 8px;">
          📷 Câmera | 🔌 USB
        </span>
      </h3>
      <div style="display: flex; gap: 8px;">
        <button class="scanner-btn" onclick="scanner.toggleUSB()" title="Ativar/Desativar Leitor USB">
          <i class="fas fa-usb"></i>
        </button>
        <button class="scanner-btn" onclick="scanner.fechar()">
          <i class="fas fa-times"></i> Fechar
        </button>
      </div>
    </div>
    
    <div class="scanner-video-container">
      <video id="scanner-video"></video>
      <div class="scanner-guide"></div>
      <div style="position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;">
        <i class="fas fa-camera"></i> Câmera
      </div>
      <div style="position: absolute; bottom: 20px; right: 20px; color: #10b981; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;">
        <i class="fas fa-check-circle"></i> Bip Ativo
      </div>
    </div>
    
    <div class="scanner-result" id="scannerResult">
      <span id="lastScanText">
        🔍 Aguardando código...<br>
        <small>Use a câmera ou leitor USB</small>
      </span>
    </div>
    
    <div class="scanner-footer">
      <input type="text" id="manualBarcode" placeholder="Ou digite o código manualmente">
      <button class="scanner-btn primary" onclick="scanner.usarManual()">
        <i class="fas fa-check"></i> Usar
      </button>
    </div>
  </div>
</div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/estoque.js"></script>
  <script src="js/vendas.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
